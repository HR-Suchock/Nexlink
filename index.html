<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NexLink — Social Platform</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c26;
      --border: rgba(255,255,255,0.07);
      --accent: #7c5cfc;
      --accent2: #fc5c7d;
      --accent-glow: rgba(124,92,252,0.35);
      --accent2-glow: rgba(252,92,125,0.25);
      --text-primary: #f0f0f8;
      --text-secondary: #8888aa;
      --text-muted: #55556a;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Ambient blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,92,252,0.18) 0%, transparent 70%);
      top: -150px; left: -150px;
      animation: drift1 8s ease-in-out infinite alternate;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(252,92,125,0.13) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: drift2 10s ease-in-out infinite alternate;
    }
    .blob-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(124,92,252,0.08) 0%, transparent 70%);
      bottom: 30%; left: 10%;
      animation: drift1 12s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift1 {
      from { transform: translate(0, 0); }
      to   { transform: translate(40px, 30px); }
    }
    @keyframes drift2 {
      from { transform: translate(0, 0); }
      to   { transform: translate(-30px, -40px); }
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Content */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 40px 24px;
      max-width: 560px;
    }

    /* Logo mark */
    .logo-mark {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 48px;
      animation: fade-up 0.6s cubic-bezier(0.4,0,0.2,1) both;
    }

    .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 14px var(--accent-glow);
      animation: pulse-dot 2.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(1.4); }
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: var(--text-secondary);
    }

    /* Headline */
    .headline {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 8vw, 4.2rem);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -2px;
      margin-bottom: 24px;
      animation: fade-up 0.7s cubic-bezier(0.4,0,0.2,1) 0.1s both;
    }

    .headline .line-plain { color: var(--text-primary); }
    .headline .line-gradient {
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Sub */
    .subtitle {
      font-size: 15px;
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 48px;
      animation: fade-up 0.7s cubic-bezier(0.4,0,0.2,1) 0.2s both;
    }

    .subtitle strong {
      color: var(--text-primary);
      font-weight: 500;
    }

    /* CTA button */
    .cta-wrap {
      animation: fade-up 0.7s cubic-bezier(0.4,0,0.2,1) 0.3s both;
    }

    .btn-start {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 36px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent) 0%, #a56cfc 50%, var(--accent2) 100%);
      background-size: 200% 200%;
      color: white;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.4,0,0.2,1), box-shadow 0.2s, background-position 0.4s;
      box-shadow: 0 6px 30px rgba(124,92,252,0.4);
      background-position: 0% 50%;
    }

    .btn-start:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 12px 40px rgba(124,92,252,0.55);
      background-position: 100% 50%;
    }

    .btn-start:active:not(:disabled) {
      transform: translateY(0) scale(1);
    }

    .btn-start:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-start .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-start.loading .spinner { display: block; }
    .btn-start.loading .btn-label { opacity: 0.6; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Arrow icon */
    .arrow-icon {
      width: 16px; height: 16px;
      transition: transform 0.2s;
    }
    .btn-start:hover .arrow-icon {
      transform: translateX(3px);
    }

    /* Features strip */
    .features {
      display: flex;
      gap: 24px;
      margin-top: 52px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fade-up 0.7s cubic-bezier(0.4,0,0.2,1) 0.45s both;
    }

    .feature-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }

    .chip-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.6;
    }
    .feature-chip:nth-child(2) .chip-dot { background: var(--accent2); }
    .feature-chip:nth-child(3) .chip-dot { background: #22c55e; }

    /* Made by */
    .made-by {
      position: fixed;
      bottom: 20px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
      z-index: 1;
      animation: fade-up 0.7s cubic-bezier(0.4,0,0.2,1) 0.6s both;
    }
    .made-by span { color: var(--accent); }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .headline { letter-spacing: -1.5px; }
      .features { gap: 16px; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container">

    <div class="logo-mark">
      <div class="logo-dot"></div>
      <span class="logo-text">NexLink</span>
    </div>

    <h1 class="headline">
      <span class="line-plain">Connect.</span><br>
      <span class="line-gradient">Share. Belong.</span>
    </h1>

    <p class="subtitle">
      A real-time social platform by <strong>Humayun Rashid Suchock</strong> — post, react, comment and connect with people, live.
    </p>

    <div class="cta-wrap">
      <button class="btn-start loading" id="startBtn" disabled>
        <div class="spinner"></div>
        <span class="btn-label">Checking…</span>
        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>

    <div class="features">
      <div class="feature-chip"><div class="chip-dot"></div>Real-time posts</div>
      <div class="feature-chip"><div class="chip-dot"></div>Likes & comments</div>
      <div class="feature-chip"><div class="chip-dot"></div>Live updates</div>
    </div>

  </div>

  <p class="made-by">Built with <span>Firebase</span> · NexLink 2025</p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1Lx114VTqRNU2sM0rfEqwLSuZyoSefqs",
      authDomain: "friends-zone-c2fe8.firebaseapp.com",
      projectId: "friends-zone-c2fe8",
      storageBucket: "friends-zone-c2fe8.appspot.com",
      messagingSenderId: "962940178101",
      appId: "1:962940178101:web:330aa526d4e7b012dff8fc",
      measurementId: "G-VPGKVYTKD1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const startBtn = document.getElementById("startBtn");

    onAuthStateChanged(auth, (user) => {
      startBtn.disabled = false;
      startBtn.classList.remove('loading');
      startBtn.querySelector('.btn-label').textContent = user ? "Go to Feed" : "Get Started";

      startBtn.addEventListener("click", () => {
        startBtn.classList.add('loading');
        startBtn.disabled = true;
        setTimeout(() => {
          window.location.href = user ? "dashboard.html" : "nexlink-auth.html";
        }, 300);
      });
    });
  </script>
</body>
</html>
